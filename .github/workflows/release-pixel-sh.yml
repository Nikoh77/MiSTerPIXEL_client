name: Release pixel.sh

# pixel.sh is the deployed artifact: a thin bash wrapper embedding a verbatim
# copy of pixel.py (regenerated by build.sh). It is NOT tracked in the repo — it
# is built here and published as a GitHub Release ASSET. The client self-update
# downloads it from the Release of the matching tag.
#
# A tag + Release is cut ONLY when CLIENT_VERSION in pixel.py names a NEW version
# higher than every existing vX.Y.Z tag (Schema 1, no regressions). Bumping that
# constant is what publishes a new build; a code change without a bump publishes
# nothing — and the client, which keys updates off CLIENT_VERSION, wouldn't pick
# it up anyway.

on:
  push:
    branches: [main]
    paths:
      - pixel.py
      - build.sh
      - .github/workflows/release-pixel-sh.yml

permissions:
  contents: write          # create tags + releases and upload assets

concurrency:
  group: release-pixel-sh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history + all tags for the version check
          fetch-tags: true

      - name: Regenerate pixel.sh from pixel.py
        run: bash build.sh

      - name: Resolve version and decide whether to release
        id: ver
        run: |
          set -euo pipefail
          ver=$(grep -oP 'CLIENT_VERSION\s*=\s*"\K[^"]+' pixel.py | head -1)
          [ -n "$ver" ] || { echo "::error::Could not read CLIENT_VERSION from pixel.py"; exit 1; }
          tag="v$ver"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          # Already released this version? -> nothing to do.
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Regression guard: CLIENT_VERSION must be strictly newer than the
          # highest existing vX.Y.Z tag (sort -V = semantic version order).
          latest=$(git tag -l 'v[0-9]*' | sed 's/^v//' | sort -V | tail -n1 || true)
          if [ -n "$latest" ]; then
            top=$(printf '%s\n%s\n' "$ver" "$latest" | sort -V | tail -n1)
            if [ "$top" = "$latest" ]; then
              echo "::error::CLIENT_VERSION $ver is not newer than latest tag v$latest (regression) — refusing to tag."
              exit 1
            fi
          fi
          echo "New version $ver — will tag and release."
          echo "release=true" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        if: steps.ver.outputs.release == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "PIXEL ${{ steps.ver.outputs.tag }}"
          # Tag push doesn't re-trigger this workflow (it filters on branch pushes).
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Publish Release with pixel.sh asset
        if: steps.ver.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha256sum pixel.sh > pixel.sh.sha256
          sum=$(cut -d' ' -f1 pixel.sh.sha256)
          gh release create "${{ steps.ver.outputs.tag }}" \
            pixel.sh pixel.sh.sha256 \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes "Automated build of pixel.sh from pixel.py at ${{ steps.ver.outputs.tag }}. sha256: $sum"
